name: Build Plugin

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p build/digital-royalty-beacon

          cp digital-royalty-beacon.php build/digital-royalty-beacon/
          cp uninstall.php build/digital-royalty-beacon/
          cp README.md build/digital-royalty-beacon/
          cp -r src build/digital-royalty-beacon/
          cp -r dist build/digital-royalty-beacon/

          cd build
          zip -r ../digital-royalty-beacon.zip digital-royalty-beacon/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: digital-royalty-beacon
          path: digital-royalty-beacon.zip
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: digital-royalty-beacon.zip
